services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-werkstatt_kanban}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-casaos-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-werkstatt_kanban}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kanban-casaos

  backend-init:
    image: ghcr.io/nowarmoreweed/kanban-werkstatt-backend:latest
    restart: "no"
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
    command:
      [
        "sh",
        "-lc",
        "npm run prisma:migrate:deploy && npm run prisma:seed"
      ]
    networks:
      - kanban-casaos

  backend:
    image: ghcr.io/nowarmoreweed/kanban-werkstatt-backend:latest
    restart: unless-stopped
    depends_on:
      backend-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV:-production}
      HOST: ${BACKEND_HOST:-0.0.0.0}
      PORT: ${BACKEND_INTERNAL_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      MANAGER_MODE_PASSWORD: ${MANAGER_MODE_PASSWORD}
      MANAGER_MODE_IDLE_MINUTES: ${MANAGER_MODE_IDLE_MINUTES:-0}
      TRUST_PROXY: ${TRUST_PROXY:-true}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kanban-casaos

  web:
    image: ghcr.io/nowarmoreweed/kanban-werkstatt-web:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PUBLIC_WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kanban-casaos

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    command:
      [
        "tunnel",
        "--no-autoupdate",
        "run",
        "--token",
        "${CLOUDFLARE_TUNNEL_TOKEN}"
      ]
    networks:
      - kanban-casaos

volumes:
  postgres-casaos-data:

networks:
  kanban-casaos:
    driver: bridge
