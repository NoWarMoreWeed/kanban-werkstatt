<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T/AO425 Kanban</title>
    <script>
      (function() {
        const storageKey = "werkstatt-kanban-theme";
        const themeMode = window.localStorage.getItem(storageKey) === "dark" ? "dark" : "light";
        document.documentElement.classList.toggle("dark", themeMode === "dark");
        document.documentElement.style.colorScheme = themeMode;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
